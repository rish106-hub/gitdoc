name: Git error request
description: Ask GitRescue to explain or handle a Git error it does not cover yet.
title: "feat: explain git error - "
labels: ["git-error", "needs-triage"]
body:
  - type: textarea
    id: error
    attributes:
      label: Git error text
      description: Paste the exact Git error. Remove private paths, repo URLs, or secrets.
      render: text
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What were you trying to do?
      placeholder: "Example: pulling from origin/main, switching branches, rebasing..."
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: What should GitRescue explain or offer?
      placeholder: "Plain-English explanation only, suggested command, or safe handler idea."
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I understand GitRescue will not generate arbitrary Git commands with AI.
          required: true
