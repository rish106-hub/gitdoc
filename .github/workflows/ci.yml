name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (src)
        run: npx tsc --noEmit

      - name: Typecheck (tests)
        run: npm run compile:test

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Package VSIX (smoke)
        run: npm run package
